name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      functions: ${{ steps.filter.outputs.functions }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'web/**'
              - '.github/workflows/ci.yml'
            functions:
              - 'functions/**'
              - '.github/workflows/ci.yml'

  web:
    name: Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          AZURE_SUBSCRIPTION_ID: 00000000-0000-0000-0000-000000000000
          AZURE_TENANT_ID: 00000000-0000-0000-0000-000000000000
          AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=build;AccountKey=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==;EndpointSuffix=core.windows.net
          SESSION_SECRET: ci_build_dummy_secret_at_least_32_chars_long

      - name: Assemble and zip standalone release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          STANDALONE_DIR=$(dirname "$(find .next/standalone -name "server.js" -maxdepth 3 | head -1)")
          echo "Standalone root: $STANDALONE_DIR"
          cp -r public "$STANDALONE_DIR/public"
          mkdir -p "$STANDALONE_DIR/.next"
          cp -r .next/static "$STANDALONE_DIR/.next/static"
          printf 'NodeVersion = "22"\nStartupCommand = "env -u HOSTNAME node server.js"\n' > "$STANDALONE_DIR/oryx-manifest.toml"
          cd "$STANDALONE_DIR" && zip -r "$GITHUB_WORKSPACE/release.zip" .

      - name: Deploy to Azure Web App
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: azure/webapps-deploy@v3
        with:
          app-name: epf-experimental-sandbox-playground
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_7331FFE3C5B34C84A639B5C17E1CA22E }}
          package: release.zip

  functions:
    name: Functions
    needs: changes
    if: needs.changes.outputs.functions == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Prune dev dependencies
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm prune --omit=dev

      - name: Create deployment package
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: zip -r ../functions-deploy.zip dist host.json package.json node_modules

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          app-name: epf-sandbox-functions
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: functions-deploy.zip
