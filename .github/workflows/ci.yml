name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://build:build@localhost/build
          AZURE_SUBSCRIPTION_ID: 00000000-0000-0000-0000-000000000000
          AZURE_TENANT_ID: 00000000-0000-0000-0000-000000000000
          AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=build;AccountKey=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==;EndpointSuffix=core.windows.net

      - name: Prune dev dependencies
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm prune --omit=dev

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          app-name: epf-experimental-sandbox-playground
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./

  functions:
    name: Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Prune dev dependencies
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm prune --omit=dev

      - name: Deploy to Azure Functions
        uses: azure/webapps-deploy@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          app-name: epf-sandbox-functions
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: ./functions
