name: Web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          AZURE_SUBSCRIPTION_ID: 00000000-0000-0000-0000-000000000000
          AZURE_TENANT_ID: 00000000-0000-0000-0000-000000000000
          AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=build;AccountKey=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==;EndpointSuffix=core.windows.net

      - name: Prune dev dependencies
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm prune --omit=dev

      - name: Create deployment package
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # Copy web/ to a staging dir and strip the 'build' script from package.json
        # before zipping.  Oryx (Azure's container build runner) detects package.json
        # and would re-run `npm run build` inside the container — which fails because
        # the required env vars aren't present there.  Without a build script Oryx
        # only runs `npm install` (a no-op since node_modules/ is already included),
        # then Azure detects server.js and runs `node server.js`.
        run: |
          STAGE="$GITHUB_WORKSPACE/deploy-stage"
          rm -rf "$STAGE"
          cp -R "$GITHUB_WORKSPACE/web/." "$STAGE"
          node -e "
            const fs = require('fs');
            const p = '$STAGE/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            delete pkg.scripts.build;
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2));
          "
          cd "$STAGE"
          zip -r "$GITHUB_WORKSPACE/deploy.zip" .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          app-name: epf-experimental-sandbox-playground
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/deploy.zip
