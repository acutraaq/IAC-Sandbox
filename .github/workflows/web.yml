name: Web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          AZURE_SUBSCRIPTION_ID: 00000000-0000-0000-0000-000000000000
          AZURE_TENANT_ID: 00000000-0000-0000-0000-000000000000
          AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=build;AccountKey=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==;EndpointSuffix=core.windows.net

      - name: Create deployment package
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # Package the Next.js standalone output.
        # standalone/ has a minimal node_modules and compiled .next/server/, but
        # .next/static/ and public/ are not bundled and must be added separately.
        # We then overwrite the generated server.js with our own (web/server.js)
        # which includes the Azure HOSTNAME fix and uses the programmatic API —
        # compatible with standalone because `next` and `.next/` are both present.
        run: |
          rm -rf "$GITHUB_WORKSPACE/deploy"
          mkdir -p "$GITHUB_WORKSPACE/deploy"
          cp -R "$GITHUB_WORKSPACE/web/.next/standalone/." "$GITHUB_WORKSPACE/deploy"
          mkdir -p "$GITHUB_WORKSPACE/deploy/.next"
          cp -R "$GITHUB_WORKSPACE/web/.next/static" "$GITHUB_WORKSPACE/deploy/.next/static"
          if [ -d "$GITHUB_WORKSPACE/web/public" ]; then
            cp -R "$GITHUB_WORKSPACE/web/public" "$GITHUB_WORKSPACE/deploy/public"
          fi
          cp "$GITHUB_WORKSPACE/web/server.js" "$GITHUB_WORKSPACE/deploy/server.js"
          cd "$GITHUB_WORKSPACE/deploy"
          zip -r "$GITHUB_WORKSPACE/deploy.zip" .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          app-name: epf-experimental-sandbox-playground
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/deploy.zip
          # Explicit startup command — equivalent to WEBSITE_STARTUP_FILE in
          # the portal.  This ensures Azure runs `node server.js` regardless
          # of what the npm start script says.
          startup-command: node server.js
