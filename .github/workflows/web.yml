name: Web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          AZURE_SUBSCRIPTION_ID: 00000000-0000-0000-0000-000000000000
          AZURE_TENANT_ID: 00000000-0000-0000-0000-000000000000
          AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=build;AccountKey=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==;EndpointSuffix=core.windows.net

      - name: Prune dev dependencies
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm prune --omit=dev

      - name: Disable Oryx build via Kudu settings API
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # The publish profile contains the Kudu credentials.  We parse them out
        # with Python (available on all GitHub-hosted runners) and POST to the
        # Kudu /api/settings endpoint to set SCM_DO_BUILD_DURING_DEPLOYMENT=false
        # before the zip deploy arrives.  Without this, Oryx detects package.json
        # and reruns `npm run build` in the App Service container — overwriting
        # the pre-built .next/ artifact we ship in the zip.
        working-directory: ${{ github.workspace }}
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          python3 - <<'PYEOF'
          import os, re, subprocess, sys, urllib.request, urllib.error, json, base64

          profile = os.environ["PUBLISH_PROFILE"]

          # Extract publishUrl (Kudu host) and credentials from the XML.
          # A publish profile has entries like:
          #   publishUrl="<appname>.scm.azurewebsites.net:443"
          #   userName="$<appname>"
          #   userPWD="<password>"
          url_match = re.search(r'publishUrl="([^"]+scm[^"]+)"', profile)
          user_match = re.search(r'userName="([^"]+)"', profile)
          pwd_match  = re.search(r'userPWD="([^"]+)"', profile)

          if not (url_match and user_match and pwd_match):
              print("Could not parse publish profile — skipping Kudu settings call", flush=True)
              sys.exit(0)

          kudu_host = url_match.group(1).split(":")[0]  # strip port
          username  = user_match.group(1)
          password  = pwd_match.group(1)

          settings_url = f"https://{kudu_host}/api/settings"
          creds = base64.b64encode(f"{username}:{password}".encode()).decode()

          payload = json.dumps({
              "SCM_DO_BUILD_DURING_DEPLOYMENT": "false",
              "WEBSITE_STARTUP_FILE": "node server.js"
          }).encode()

          req = urllib.request.Request(
              settings_url,
              data=payload,
              headers={
                  "Authorization": f"Basic {creds}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Kudu settings updated: HTTP {resp.status}", flush=True)
          except urllib.error.HTTPError as e:
              print(f"Kudu settings call failed: HTTP {e.code} {e.reason}", flush=True)
              # Non-fatal: the portal setting should already be correct; proceed.
          PYEOF

      - name: Create deployment package
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # cd into web/ so zip entries start at the app root (server.js, .next/,
        # node_modules/, etc.) rather than web/...  Azure extracts the zip into
        # /home/site/wwwroot so every entry must be relative to the app root.
        # The zip is written to the workspace root so the path reference below
        # is unambiguous.  Linux zip includes dot-directories (.next/) by default.
        run: |
          cd "$GITHUB_WORKSPACE/web"
          zip -r "$GITHUB_WORKSPACE/deploy.zip" .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          app-name: epf-experimental-sandbox-playground
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/deploy.zip
          # Explicit startup command — equivalent to WEBSITE_STARTUP_FILE in
          # the portal.  This ensures Azure runs `node server.js` regardless
          # of what the npm start script says.
          startup-command: node server.js
