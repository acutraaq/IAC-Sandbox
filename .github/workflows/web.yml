name: Web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          AZURE_SUBSCRIPTION_ID: 00000000-0000-0000-0000-000000000000
          AZURE_TENANT_ID: 00000000-0000-0000-0000-000000000000
          AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=build;AccountKey=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==;EndpointSuffix=core.windows.net

      - name: Disable Oryx build via Kudu settings API
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # The publish profile contains the Kudu credentials.  We parse them out
        # with Python (available on all GitHub-hosted runners) and POST to the
        # Kudu /api/settings endpoint to set SCM_DO_BUILD_DURING_DEPLOYMENT=false
        # before the zip deploy arrives.  Without this, Oryx detects package.json
        # and reruns `npm run build` in the App Service container — overwriting
        # the pre-built .next/ artifact we ship in the zip.
        working-directory: ${{ github.workspace }}
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          python3 - <<'PYEOF'
          import os, re, sys, urllib.request, urllib.error, json, base64

          profile = os.environ["PUBLISH_PROFILE"]

          # The MSDeploy publishUrl is <appname>.azurewebsites.net (no "scm").
          # Derive the Kudu host by inserting ".scm" — this is always reliable
          # because the app name is already hardcoded in the deploy step.
          kudu_host = "epf-experimental-sandbox-playground.scm.azurewebsites.net"

          # Credentials: the MSDeploy entry userName is "$<appname>".
          user_match = re.search(r'userName="(\$[^"]+)"', profile)
          pwd_match  = re.search(r'userPWD="([^"]+)"', profile)

          if not (user_match and pwd_match):
              print("Could not parse publish profile credentials — skipping Kudu settings call", flush=True)
              sys.exit(0)

          username = user_match.group(1)
          password = pwd_match.group(1)

          settings_url = f"https://{kudu_host}/api/settings"
          creds = base64.b64encode(f"{username}:{password}".encode()).decode()

          payload = json.dumps({
              "SCM_DO_BUILD_DURING_DEPLOYMENT": "false",
              "WEBSITE_STARTUP_FILE": "node server.js"
          }).encode()

          req = urllib.request.Request(
              settings_url,
              data=payload,
              headers={
                  "Authorization": f"Basic {creds}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Kudu settings updated: HTTP {resp.status}", flush=True)
          except (urllib.error.HTTPError, urllib.error.URLError) as e:
              print(f"Kudu settings call failed (non-fatal): {e}", flush=True)
          PYEOF

      - name: Create deployment package
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # Package the Next.js standalone output.
        # standalone/ contains server.js + minimal node_modules, but static assets
        # and public/ must be copied in separately — Next.js does not bundle them.
        run: |
          rm -rf "$GITHUB_WORKSPACE/deploy"
          mkdir -p "$GITHUB_WORKSPACE/deploy"
          cp -R "$GITHUB_WORKSPACE/web/.next/standalone/." "$GITHUB_WORKSPACE/deploy"
          mkdir -p "$GITHUB_WORKSPACE/deploy/.next"
          cp -R "$GITHUB_WORKSPACE/web/.next/static" "$GITHUB_WORKSPACE/deploy/.next/static"
          if [ -d "$GITHUB_WORKSPACE/web/public" ]; then
            cp -R "$GITHUB_WORKSPACE/web/public" "$GITHUB_WORKSPACE/deploy/public"
          fi
          # Azure App Service sets HOSTNAME to the internal container hostname.
          # Next.js uses it as the bind address and ends up on the wrong interface,
          # failing the nginx health check.  Prepend the fix to the standalone server.js
          # (which Next.js generates — our web/server.js is not deployed in standalone mode).
          node -e "
            const fs = require('fs');
            const p = '$GITHUB_WORKSPACE/deploy/server.js';
            fs.writeFileSync(p, 'delete process.env.HOSTNAME;\n' + fs.readFileSync(p, 'utf8'));
          "
          cd "$GITHUB_WORKSPACE/deploy"
          zip -r "$GITHUB_WORKSPACE/deploy.zip" .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          app-name: epf-experimental-sandbox-playground
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/deploy.zip
          # Explicit startup command — equivalent to WEBSITE_STARTUP_FILE in
          # the portal.  This ensures Azure runs `node server.js` regardless
          # of what the npm start script says.
          startup-command: node server.js
