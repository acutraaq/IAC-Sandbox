name: Web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AZURE_WEBAPP_NAME: epf-experimental-sandbox-playground

jobs:
  web:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          AZURE_SUBSCRIPTION_ID: 00000000-0000-0000-0000-000000000000
          AZURE_TENANT_ID: 00000000-0000-0000-0000-000000000000
          AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=build;AccountKey=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==;EndpointSuffix=core.windows.net

      - name: Assemble standalone output
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          cp -r public .next/standalone/public
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static
          # Prepend HOSTNAME override so Next.js standalone server binds to 0.0.0.0.
          # Azure sets HOSTNAME to the internal container hostname; without this the
          # app listens on the wrong interface and fails the nginx health check.
          sed -i '1s/^/process.env.HOSTNAME = "0.0.0.0";\n/' .next/standalone/server.js
          printf 'NodeVersion=22\nStartupFileName=server.js\n' > .next/standalone/oryx-manifest.toml

      - name: Zip standalone release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: cd .next/standalone && zip -r ../../../release.zip .

      - name: Deploy to Azure Web App
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
